services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ghost_relay
      POSTGRES_USER: ghost
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghost -d ghost_relay"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ghost-relay:
    build: .
    container_name: ghost-relay
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ghost:changeme@db:5432/ghost_relay
      REDIS_URL: redis://redis:6379/0
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ghost.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-in-production}
      CRYPTO_SALT: ${CRYPTO_SALT:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
